# GPT Image Studio — Docker Compose
#
# Default profile: web frontend only (nginx static hosting).
# Users open http://localhost:8080 and use "直连模式" (direct mode) with their
# own OpenAI-compatible Images API base URL + key. No backend needed.
#
# Optional `companion` profile: runs the local credential proxy as a sidecar.
# IMPORTANT: companion/src/server.ts currently binds 127.0.0.1 only, so it is
# NOT reachable from the host browser out of the box. Enable it only after
# patching the source to support --host 0.0.0.0 (see notes at bottom of this
# file). Until then, keep it disabled and use direct mode.

services:
  web:
    build:
      context: .
      target: web
    image: gpt-image-studio:latest
    container_name: gpt-image-studio-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # --- Optional companion sidecar (disabled by default) ---
  # Uncomment the lines below AND apply the source patch described at the
  # bottom of this file before enabling.
  #
  # companion:
  #   profiles: ["companion"]
  #   build:
  #     context: .
  #     target: companion
  #   image: gpt-image-studio-companion:latest
  #   container_name: gpt-image-studio-companion
  #   ports:
  #     - "19750:19750"
  #   # The container's 127.0.0.1 is not the host's; bind 0.0.0.0 in the app
  #   # and tell the browser to reach companion at http://localhost:19750
  #   # (host port mapping) OR at http://companion:19750 if you front it.
  #   command: ["node", "dist/main.js", "serve", "--host", "0.0.0.0", "--port", "19750", "--allow-origin", "http://localhost:8080"]
  #   volumes:
  #     # Persist credentials + pairing state across restarts
  #     - companion-data:/root/.gpt-image-studio
  #   restart: unless-stopped

