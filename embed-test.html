<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT Image Studio iframe Embed Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f5f4;
        color: #1c1917;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        min-height: 100vh;
      }

      aside {
        border-right: 1px solid #e7e5e4;
        background: #ffffff;
        padding: 20px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      p {
        margin: 8px 0 0;
        color: #78716c;
        font-size: 13px;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #57534e;
        font-size: 13px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #d6d3d1;
        border-radius: 8px;
        background: #ffffff;
        color: #1c1917;
        font: inherit;
        font-weight: 400;
        outline: none;
        padding: 9px 10px;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: #57534e;
        box-shadow: 0 0 0 3px rgb(87 83 78 / 12%);
      }

      .inline-label {
        align-items: center;
        display: flex;
        flex-direction: row;
        gap: 8px;
      }

      .inline-label input {
        width: auto;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #1c1917;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 12px;
      }

      button:hover {
        background: #44403c;
      }

      code {
        display: block;
        margin-top: 16px;
        overflow-wrap: anywhere;
        border-radius: 8px;
        background: #f5f5f4;
        color: #44403c;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.5;
        padding: 12px;
      }

      .notice {
        display: none;
        margin-top: 14px;
        border-radius: 8px;
        background: #fff7ed;
        color: #9a3412;
        font-size: 12px;
        line-height: 1.5;
        padding: 10px 12px;
      }

      .notice[data-visible="true"] {
        display: block;
      }

      section {
        min-width: 0;
        padding: 16px;
      }

      iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 32px);
        border: 1px solid #d6d3d1;
        border-radius: 10px;
        background: #ffffff;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid #e7e5e4;
        }

        iframe {
          height: 720px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>iframe 嵌入测试</h1>
        <p>修改参数后刷新右侧 iframe，确认页面能加载、参数会写入设置，并且地址栏里的敏感参数会被清除。</p>

        <form id="embedForm">
          <label>
            平台地址
            <input id="studioUrl" value="http://127.0.0.1:8888/" />
          </label>

          <label>
            API URL
            <input id="apiUrl" value="https://api.packyapi.com/v1/images" />
          </label>

          <label>
            API Key
            <input id="apiKey" value="sk-test" />
          </label>

          <label>
            Model
            <input id="model" value="gpt-image-2" />
          </label>

          <label>
            Prompt
            <textarea id="prompt">生成一张白底商品主图</textarea>
          </label>

          <label>
            尺寸
            <select id="size">
              <option value="auto">auto</option>
              <option value="1:1" selected>1:1</option>
              <option value="16:9">16:9</option>
              <option value="9:16">9:16</option>
              <option value="custom">custom</option>
            </select>
          </label>

          <label>
            分辨率
            <select id="resolution">
              <option value="1k" selected>1k</option>
              <option value="2k">2k</option>
              <option value="4k">4k</option>
            </select>
          </label>

          <label>
            背景
            <select id="background">
              <option value="auto" selected>auto</option>
              <option value="opaque">opaque</option>
              <option value="transparent">transparent</option>
            </select>
          </label>

          <label>
            输出格式
            <select id="outputFormat">
              <option value="png" selected>png</option>
              <option value="webp">webp</option>
              <option value="jpeg">jpeg</option>
            </select>
          </label>

          <label class="inline-label">
            <input id="useSettingsParam" type="checkbox" checked />
            使用 settings JSON 参数
          </label>

          <button type="submit">刷新 iframe</button>
        </form>

        <code id="iframeSrc"></code>
        <div class="notice" id="crossOriginNotice">
          当前 iframe 与测试页不是同源。浏览器可能会把 IndexedDB
          按顶层站点分区，因此这里看到的数据可能不同于直接打开平台时的数据。
          如果平台地址是线上域名，还需要确认线上版本已经部署了 URL 参数支持。
        </div>
      </aside>

      <section>
        <iframe
          id="studioFrame"
          title="GPT Image Studio"
          allow="clipboard-read; clipboard-write"
        ></iframe>
      </section>
    </main>

    <script>
      const form = document.querySelector("#embedForm");
      const frame = document.querySelector("#studioFrame");
      const iframeSrc = document.querySelector("#iframeSrc");
      const studioUrl = document.querySelector("#studioUrl");
      const apiUrl = document.querySelector("#apiUrl");
      const apiKey = document.querySelector("#apiKey");
      const model = document.querySelector("#model");
      const prompt = document.querySelector("#prompt");
      const size = document.querySelector("#size");
      const resolution = document.querySelector("#resolution");
      const background = document.querySelector("#background");
      const outputFormat = document.querySelector("#outputFormat");
      const useSettingsParam = document.querySelector("#useSettingsParam");
      const crossOriginNotice = document.querySelector("#crossOriginNotice");

      function buildEmbedUrl() {
        const url = new URL(studioUrl.value);
        if (useSettingsParam.checked) {
          url.searchParams.set("settings", JSON.stringify({
            apiUrl: apiUrl.value,
            apiKey: apiKey.value,
            model: model.value,
            prompt: prompt.value,
            size: size.value,
            resolution: resolution.value,
            background: background.value,
            outputFormat: outputFormat.value,
          }));
        } else {
          url.searchParams.set("apiUrl", apiUrl.value);
          url.searchParams.set("apiKey", apiKey.value);
          url.searchParams.set("model", model.value);
          url.searchParams.set("prompt", prompt.value);
          url.searchParams.set("size", size.value);
          url.searchParams.set("resolution", resolution.value);
          url.searchParams.set("background", background.value);
          url.searchParams.set("outputFormat", outputFormat.value);
        }
        return url.toString();
      }

      function refreshFrame() {
        const src = buildEmbedUrl();
        frame.src = src;
        iframeSrc.textContent = src;
        crossOriginNotice.dataset.visible = String(new URL(src).origin !== window.location.origin);
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        refreshFrame();
      });

      refreshFrame();
    </script>
  </body>
</html>
